name: Update fundamentals monthly dataset

on:
  schedule:
    # Monthly refresh near the start of each month. UTC 23:20 = Hong Kong 07:20 next day.
    - cron: "20 23 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure latest RS dataset exists
        run: |
          if [ ! -f data/latest/rs_latest.parquet ]; then
            python rs_ranking.py --build-daily
          fi

      - name: Build fundamentals dataset
        run: python rs_ranking.py --build-fundamentals

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest/*.parquet data/fundamentals/*.parquet
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: update fundamentals dataset"
            git push
          fi
